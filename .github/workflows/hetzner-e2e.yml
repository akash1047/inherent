# Validates Hetzner production path (#83). Uses published images.
# Costs real Hetzner resources. Not a PR merge gate.
# Runs after successful Publish images (final v* tags) or via workflow_dispatch.
name: Hetzner e2e

on:
  workflow_run:
    workflows: ["Publish images"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: Git tag/branch/SHA to checkout and for compose_git_ref
        type: string
        required: true
      inherent_version:
        description: Docker image tag (empty = strip leading v from ref)
        type: string
        default: ""
      server_type:
        # cpx32: compose e2e needs headroom for TEI + full stack (cpx22 is fine for lighter manual deploys)
        description: Hetzner server type (default cpx32 for compose e2e headroom)
        type: string
        default: cpx32

concurrency:
  group: hetzner-e2e
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  hetzner-e2e:
    name: Hetzner Terraform compose e2e
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Dispatch always; workflow_run only after successful Publish images.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Resolve ref and image tag
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_INHERENT_VERSION: ${{ inputs.inherent_version }}
          WR_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            GIT_REF="$INPUT_REF"
            IMAGE_TAG="$INPUT_INHERENT_VERSION"
          else
            # Tag push workflows put the tag name in head_branch.
            GIT_REF="$WR_HEAD_BRANCH"
            if [ -z "$GIT_REF" ]; then
              GIT_REF="$WR_HEAD_SHA"
            fi
            IMAGE_TAG=""
          fi

          if [ -z "$GIT_REF" ]; then
            echo "::error::could not resolve git_ref from event"
            exit 1
          fi

          # Automation: final tags only (v* without hyphen; skip RCs like v0.4.0-rc1).
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            case "$GIT_REF" in
              v*)
                if echo "$GIT_REF" | grep -q '-'; then
                  echo "Skipping e2e for pre-release/RC ref: $GIT_REF"
                  echo "skip=true" >> "$GITHUB_OUTPUT"
                  exit 0
                fi
                ;;
              *)
                echo "Skipping e2e: workflow_run ref is not a final v* tag: $GIT_REF"
                echo "skip=true" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
            esac
          fi

          if [ -z "$IMAGE_TAG" ]; then
            # Strip one leading v (v0.4.0 → 0.4.0).
            IMAGE_TAG="${GIT_REF#v}"
          fi
          if [ -z "$IMAGE_TAG" ]; then
            echo "::error::image_tag is empty; pass inherent_version or a resolvable ref"
            exit 1
          fi

          echo "git_ref=$GIT_REF" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Resolved git_ref=$GIT_REF image_tag=$IMAGE_TAG"

      - name: Check out repository
        if: steps.meta.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.git_ref }}

      - name: Require HCLOUD_TOKEN and S3 backend secrets/vars
        if: steps.meta.outputs.skip != 'true'
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          HETZNER_S3_BUCKET: ${{ vars.HETZNER_S3_BUCKET }}
          HETZNER_S3_ENDPOINT: ${{ vars.HETZNER_S3_ENDPOINT }}
        run: |
          missing=0
          if [ -z "$HCLOUD_TOKEN" ]; then
            echo "::error::secrets.HCLOUD_TOKEN is empty; cannot provision Hetzner VM"
            missing=1
          fi
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::error::secrets.AWS_ACCESS_KEY_ID is empty; cannot use Hetzner Object Storage state"
            missing=1
          fi
          if [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "::error::secrets.AWS_SECRET_ACCESS_KEY is empty; cannot use Hetzner Object Storage state"
            missing=1
          fi
          if [ -z "$HETZNER_S3_BUCKET" ]; then
            echo "::error::vars.HETZNER_S3_BUCKET is empty; cannot use Hetzner Object Storage state"
            missing=1
          fi
          if [ -z "$HETZNER_S3_ENDPOINT" ]; then
            echo "::error::vars.HETZNER_S3_ENDPOINT is empty; cannot use Hetzner Object Storage state"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Generate SSH key pair
        if: steps.meta.outputs.skip != 'true'
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          KEY="$RUNNER_TEMP/hetzner_ci"
          ssh-keygen -t ed25519 -N "" -f "$KEY" -C "inherent-ci-${RUN_ID}"
          chmod 600 "$KEY"
          echo "HETZNER_SSH_KEY=$KEY" >> "$GITHUB_ENV"
          echo "HETZNER_SSH_PUB=${KEY}.pub" >> "$GITHUB_ENV"

      # Per-run key so logs/state never reuse the well-known local dev bootstrap key.
      - name: Generate per-run integration API key
        if: steps.meta.outputs.skip != 'true'
        run: |
          API_KEY="ink_ci_$(openssl rand -hex 16)"
          echo "::add-mask::${API_KEY}"
          echo "INTEGRATION_API_KEY=${API_KEY}" >> "$GITHUB_ENV"

      - name: Set up Terraform
        if: steps.meta.outputs.skip != 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Set up uv
        if: steps.meta.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Remote CI state on Hetzner Object Storage; never prod key.
      # Survives runner death for recover workflow.
      - name: Terraform init (remote S3 state)
        if: steps.meta.outputs.skip != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
          HETZNER_S3_BUCKET: ${{ vars.HETZNER_S3_BUCKET }}
          HETZNER_S3_ENDPOINT: ${{ vars.HETZNER_S3_ENDPOINT }}
          RUN_ID: ${{ github.run_id }}
        run: |
          REGION="${AWS_DEFAULT_REGION:-eu-central}"
          export AWS_DEFAULT_REGION="$REGION"
          cat > infra/backend-ci.hcl <<EOF
          bucket = "${HETZNER_S3_BUCKET}"
          key    = "inherent/ci/${RUN_ID}/terraform.tfstate"

          endpoints = {
            s3 = "${HETZNER_S3_ENDPOINT}"
          }

          skip_credentials_validation = true
          skip_metadata_api_check     = true
          skip_region_validation      = true
          skip_requesting_account_id  = true
          use_path_style              = true
          EOF
          terraform -chdir=infra init -input=false -reconfigure -backend-config=backend-ci.hcl

      - name: Terraform apply
        if: steps.meta.outputs.skip != 'true'
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
          SERVER_TYPE: ${{ inputs.server_type || 'cpx32' }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          GIT_REF: ${{ steps.meta.outputs.git_ref }}
          RUN_ID: ${{ github.run_id }}
        run: |
          REGION="${AWS_DEFAULT_REGION:-eu-central}"
          export AWS_DEFAULT_REGION="$REGION"
          terraform -chdir=infra apply -auto-approve \
            -var="server_name=inherent-ci-${RUN_ID}" \
            -var="ssh_key_name=inherent-ci-key-${RUN_ID}" \
            -var="ssh_public_key_path=${HETZNER_SSH_PUB}" \
            -var="inherent_version=${IMAGE_TAG}" \
            -var="compose_git_ref=${GIT_REF}" \
            -var="server_type=${SERVER_TYPE}" \
            -var="environment=ci"

      - name: Export server IP
        if: steps.meta.outputs.skip != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
        run: |
          set -euo pipefail
          REGION="${AWS_DEFAULT_REGION:-eu-central}"
          export AWS_DEFAULT_REGION="$REGION"
          IP=$(terraform -chdir=infra output -raw server_ipv4)
          if [ -z "${IP}" ]; then
            echo "::error::terraform output server_ipv4 was empty; cannot continue without SERVER_IPV4"
            exit 1
          fi
          echo "SERVER_IPV4=${IP}" >> "$GITHUB_ENV"

      - name: Wait for cloud-init then public API healthy
        if: steps.meta.outputs.skip != 'true'
        run: |
          set -euo pipefail
          SSH_OPTS=(-i "$HETZNER_SSH_KEY" -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 -o BatchMode=yes)

          # Hetzner reports the server created before sshd is listening; a single
          # ssh attempt right after apply routinely hits "Connection refused".
          # Retry until sshd answers or a deadline passes, separately from the
          # cloud-init wait below, so a refused connection is never misreported
          # as a cloud-init timeout (#106).
          echo "Waiting for SSH on ${SERVER_IPV4}..."
          ssh_ready=0
          last_err=""
          ssh_deadline=$(( $(date +%s) + 180 ))
          attempt=0
          while [ "$(date +%s)" -lt "$ssh_deadline" ]; do
            attempt=$((attempt + 1))
            if last_err=$(ssh "${SSH_OPTS[@]}" "root@${SERVER_IPV4}" true 2>&1); then
              ssh_ready=1
              echo "SSH reachable after ${attempt} attempt(s)"
              break
            fi
            # Auth/host-key failures are permanent, not a startup race — fail
            # fast instead of burning the full budget retrying something that
            # will never succeed, and surface the real reason (#106 follow-up:
            # these were previously indistinguishable from "sshd not up yet"
            # because stderr was discarded).
            if echo "$last_err" | grep -qiE 'permission denied|host key verification failed'; then
              echo "::error::SSH to ${SERVER_IPV4} failed with an auth/host-key error, not a connectivity race: ${last_err}"
              exit 1
            fi
            echo "SSH not ready yet (attempt ${attempt}): ${last_err}"
            sleep 5
          done
          if [ "$ssh_ready" -ne 1 ]; then
            echo "::error::SSH to ${SERVER_IPV4} never became reachable within 180s (last error: ${last_err})"
            exit 1
          fi

          echo "SSH reachable; waiting for cloud-init to finish on ${SERVER_IPV4}..."
          if timeout 600 ssh "${SSH_OPTS[@]}" \
            "root@${SERVER_IPV4}" \
            "cloud-init status --wait"; then
            cloud_init_rc=0
          else
            cloud_init_rc=$?
          fi
          if [ "$cloud_init_rc" -ne 0 ]; then
            # timeout(1) exits 124 specifically when it killed the command for
            # running too long; any other non-zero code is ssh/cloud-init
            # itself failing, not a 600s timeout, so say so distinctly.
            if [ "$cloud_init_rc" -eq 124 ]; then
              echo "::error::cloud-init did not complete within 600s on ${SERVER_IPV4}"
            else
              echo "::error::cloud-init check failed on ${SERVER_IPV4} (ssh/cloud-init exited ${cloud_init_rc}, not a 600s timeout)"
            fi
            ssh "${SSH_OPTS[@]}" \
              "root@${SERVER_IPV4}" \
              "cloud-init status || true; journalctl -u cloud-final --no-pager -n 80 || true" || true
            exit 1
          fi
          echo "cloud-init finished; polling /health"
          for i in $(seq 1 60); do
            if curl -fsS "http://${SERVER_IPV4}:18000/health" >/dev/null 2>&1; then
              echo "public API healthy on ${SERVER_IPV4}"; exit 0
            fi
            echo "waiting for public API ($i)..."; sleep 15
          done
          echo "::error::public API on ${SERVER_IPV4}:18000 did not become healthy in time"; exit 1

      - name: Bootstrap dev workspace and API key on VM
        if: steps.meta.outputs.skip != 'true'
        run: |
          # Pass per-run key into bootstrap (scripts/dev/bootstrap.sh reads API_KEY).
          # ConnectTimeout/BatchMode bound connection setup and rule out an
          # interactive prompt hang; SSH is already confirmed reachable by the
          # previous step, so no retry loop needed here, just the same
          # connect-time bounds (#106 follow-up: this was the one remaining
          # unbounded ssh call in the job).
          ssh -i "$HETZNER_SSH_KEY" \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=10 \
            -o BatchMode=yes \
            -o ServerAliveInterval=5 \
            -o ServerAliveCountMax=3 \
            "root@${SERVER_IPV4}" \
            "API_KEY=${INTEGRATION_API_KEY} bash -s" < scripts/dev/bootstrap.sh

      # Fail fast when public-api cannot auth to Weaviate (stale image / missing Bearer).
      - name: Preflight Weaviate auth via public-api search
        if: steps.meta.outputs.skip != 'true'
        run: |
          BASE="http://${SERVER_IPV4}:18000"
          RESP=$(curl -sS -w "\n%{http_code}" -X POST "${BASE}/v1/search" \
            -H "X-API-Key: ${INTEGRATION_API_KEY}" \
            -H "X-Workspace-Id: ws_local_001" \
            -H "Content-Type: application/json" \
            -d '{"query":"ping","limit":1}' || true)
          BODY=$(echo "$RESP" | sed '$d')
          CODE=$(echo "$RESP" | tail -n1)
          echo "preflight HTTP ${CODE}"
          echo "$BODY" | head -c 2000
          if echo "$BODY" | grep -qiE 'weaviate.*(401|Unauthorized)|(401|Unauthorized).*weaviate' \
            || { [ "$CODE" = "500" ] && echo "$BODY" | grep -qiE 'weaviate' && echo "$BODY" | grep -qiE '401|Unauthorized'; }; then
            echo "::error::public-api cannot authenticate to Weaviate (401 Unauthorized on graphql). Stale public-api-svc image is likely missing Bearer auth to Weaviate. Republish via the Publish images workflow and see docs/audit/act-hetzner-e2e-weaviate-401.md"
            exit 1
          fi
          if [ "$CODE" = "200" ]; then
            echo "Weaviate auth preflight OK"
            exit 0
          fi
          echo "warning: preflight got HTTP ${CODE} without Weaviate 401 pattern; leaving diagnosis to pytest"
          exit 0

      - name: Run public-api compose tests
        if: steps.meta.outputs.skip != 'true'
        working-directory: services/inh-public-api-svc
        env:
          PUBLIC_API_URL: http://${{ env.SERVER_IPV4 }}:18000
          INTEGRATION_API_KEY: ${{ env.INTEGRATION_API_KEY }}
          INTEGRATION_WORKSPACE_ID: ws_local_001
          INTEGRATION_TIMEOUT: "600"
        run: |
          uv sync --frozen --extra dev --group dev
          uv run pytest -m compose

      - name: Dump Compose logs on failure
        if: failure() && steps.meta.outputs.skip != 'true'
        continue-on-error: true
        run: |
          # SSH may still be down here if the failure happened before it ever
          # came up; check first so this reports cleanly instead of another
          # confusing "Connection refused" (#106). Reuse the same bounded
          # options for the real dump call too, plus keepalives so a session
          # that blackholes post-connect gets torn down instead of hanging —
          # a hung step here would block the always() Terraform destroy below
          # and leave a paid VM running.
          SSH_OPTS=(-i "$HETZNER_SSH_KEY" -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 -o BatchMode=yes -o ServerAliveInterval=5 -o ServerAliveCountMax=3)
          if ! ssh "${SSH_OPTS[@]}" "root@${SERVER_IPV4}" true 2>/dev/null; then
            echo "SSH to ${SERVER_IPV4} unreachable; skipping compose log dump"
            exit 0
          fi
          timeout 60 ssh "${SSH_OPTS[@]}" \
            "root@${SERVER_IPV4}" \
            'docker compose -f /opt/inherent/docker-compose.release.yml logs --no-color --tail=200' || true

      # Always destroy using remote CI state so CI never leaves a paid VM.
      - name: Terraform destroy
        if: always() && steps.meta.outputs.skip != 'true'
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
          HETZNER_S3_BUCKET: ${{ vars.HETZNER_S3_BUCKET }}
          HETZNER_S3_ENDPOINT: ${{ vars.HETZNER_S3_ENDPOINT }}
          SERVER_TYPE: ${{ inputs.server_type || 'cpx32' }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          GIT_REF: ${{ steps.meta.outputs.git_ref }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ -z "${HCLOUD_TOKEN}" ]; then
            echo "::error::secrets.HCLOUD_TOKEN is empty; cannot destroy"
            exit 1
          fi
          if [ -z "${AWS_ACCESS_KEY_ID}" ]; then
            echo "::error::secrets.AWS_ACCESS_KEY_ID is empty; cannot destroy"
            exit 1
          fi
          if [ -z "${AWS_SECRET_ACCESS_KEY}" ]; then
            echo "::error::secrets.AWS_SECRET_ACCESS_KEY is empty; cannot destroy"
            exit 1
          fi
          if [ -z "${HETZNER_S3_BUCKET}" ]; then
            echo "::error::vars.HETZNER_S3_BUCKET is empty; cannot destroy"
            exit 1
          fi
          if [ -z "${HETZNER_S3_ENDPOINT}" ]; then
            echo "::error::vars.HETZNER_S3_ENDPOINT is empty; cannot destroy"
            exit 1
          fi
          REGION="${AWS_DEFAULT_REGION:-eu-central}"
          export AWS_DEFAULT_REGION="$REGION"
          # Rewrite backend-ci.hcl + re-init so destroy works alone after cancel.
          cat > infra/backend-ci.hcl <<EOF
          bucket = "${HETZNER_S3_BUCKET}"
          key    = "inherent/ci/${RUN_ID}/terraform.tfstate"

          endpoints = {
            s3 = "${HETZNER_S3_ENDPOINT}"
          }

          skip_credentials_validation = true
          skip_metadata_api_check     = true
          skip_region_validation      = true
          skip_requesting_account_id  = true
          use_path_style              = true
          EOF
          terraform -chdir=infra init -input=false -reconfigure -backend-config=backend-ci.hcl
          ok=0
          for attempt in 1 2 3; do
            if terraform -chdir=infra destroy -auto-approve \
              -var="server_name=inherent-ci-${RUN_ID}" \
              -var="ssh_key_name=inherent-ci-key-${RUN_ID}" \
              -var="ssh_public_key_path=${HETZNER_SSH_PUB}" \
              -var="inherent_version=${IMAGE_TAG}" \
              -var="compose_git_ref=${GIT_REF}" \
              -var="server_type=${SERVER_TYPE}" \
              -var="environment=ci"; then
              ok=1
              break
            fi
            echo "terraform destroy attempt ${attempt}/3 failed"
            if [ "$attempt" -lt 3 ]; then
              sleep $(( attempt * 20 ))
            fi
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::terraform destroy failed after 3 attempts; use Hetzner e2e recover destroy with run_id=${RUN_ID}"
            exit 1
          fi
