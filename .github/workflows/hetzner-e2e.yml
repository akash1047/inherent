# Validates Hetzner production path (#83). Uses published images.
# Costs real Hetzner resources. Not a PR merge gate.
# Runs after successful Publish images (final v* tags) or via workflow_dispatch.
name: Hetzner e2e

on:
  workflow_run:
    workflows: ["Publish images"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: Git tag/branch/SHA to checkout and for compose_git_ref
        type: string
        required: true
      inherent_version:
        description: Docker image tag (empty = strip leading v from ref)
        type: string
        default: ""
      server_type:
        description: Hetzner server type
        type: string
        default: cpx32

concurrency:
  group: hetzner-e2e
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  hetzner-e2e:
    name: Hetzner Terraform compose e2e
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Dispatch always; workflow_run only after successful Publish images.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Resolve ref and image tag
        id: meta
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            GIT_REF="${{ inputs.ref }}"
            IMAGE_TAG="${{ inputs.inherent_version }}"
          else
            # Tag push workflows put the tag name in head_branch.
            GIT_REF="${{ github.event.workflow_run.head_branch }}"
            if [ -z "$GIT_REF" ]; then
              GIT_REF="${{ github.event.workflow_run.head_sha }}"
            fi
            IMAGE_TAG=""
          fi

          if [ -z "$GIT_REF" ]; then
            echo "::error::could not resolve git_ref from event"
            exit 1
          fi

          # Automation: final tags only (v* without hyphen; skip RCs like v0.4.0-rc1).
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            case "$GIT_REF" in
              v*)
                if echo "$GIT_REF" | grep -q '-'; then
                  echo "Skipping e2e for pre-release/RC ref: $GIT_REF"
                  echo "skip=true" >> "$GITHUB_OUTPUT"
                  exit 0
                fi
                ;;
              *)
                echo "Skipping e2e: workflow_run ref is not a final v* tag: $GIT_REF"
                echo "skip=true" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
            esac
          fi

          if [ -z "$IMAGE_TAG" ]; then
            # Strip one leading v (v0.4.0 → 0.4.0).
            IMAGE_TAG="${GIT_REF#v}"
          fi
          if [ -z "$IMAGE_TAG" ]; then
            echo "::error::image_tag is empty; pass inherent_version or a resolvable ref"
            exit 1
          fi

          echo "git_ref=$GIT_REF" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Resolved git_ref=$GIT_REF image_tag=$IMAGE_TAG"

      - name: Check out repository
        if: steps.meta.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.git_ref }}

      - name: Require HCLOUD_TOKEN and S3 backend secrets/vars
        if: steps.meta.outputs.skip != 'true'
        run: |
          missing=0
          if [ -z "${{ secrets.HCLOUD_TOKEN }}" ]; then
            echo "::error::secrets.HCLOUD_TOKEN is empty; cannot provision Hetzner VM"
            missing=1
          fi
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "::error::secrets.AWS_ACCESS_KEY_ID is empty; cannot use Hetzner Object Storage state"
            missing=1
          fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "::error::secrets.AWS_SECRET_ACCESS_KEY is empty; cannot use Hetzner Object Storage state"
            missing=1
          fi
          if [ -z "${{ vars.HETZNER_S3_BUCKET }}" ]; then
            echo "::error::vars.HETZNER_S3_BUCKET is empty; cannot use Hetzner Object Storage state"
            missing=1
          fi
          if [ -z "${{ vars.HETZNER_S3_ENDPOINT }}" ]; then
            echo "::error::vars.HETZNER_S3_ENDPOINT is empty; cannot use Hetzner Object Storage state"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Generate SSH key pair
        if: steps.meta.outputs.skip != 'true'
        run: |
          KEY="$RUNNER_TEMP/hetzner_ci"
          ssh-keygen -t ed25519 -N "" -f "$KEY" -C "inherent-ci-${{ github.run_id }}"
          chmod 600 "$KEY"
          echo "HETZNER_SSH_KEY=$KEY" >> "$GITHUB_ENV"
          echo "HETZNER_SSH_PUB=${KEY}.pub" >> "$GITHUB_ENV"

      - name: Set up Terraform
        if: steps.meta.outputs.skip != 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Set up uv
        if: steps.meta.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Remote CI state on Hetzner Object Storage; never prod key.
      # Survives runner death for recover workflow.
      - name: Terraform init (remote S3 state)
        if: steps.meta.outputs.skip != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          REGION="${{ vars.AWS_DEFAULT_REGION }}"
          REGION="${REGION:-eu-central}"
          export AWS_DEFAULT_REGION="$REGION"
          cat > infra/backend-ci.hcl <<EOF
          bucket = "${{ vars.HETZNER_S3_BUCKET }}"
          key    = "inherent/ci/${{ github.run_id }}/terraform.tfstate"

          endpoints = {
            s3 = "${{ vars.HETZNER_S3_ENDPOINT }}"
          }

          skip_credentials_validation = true
          skip_metadata_api_check     = true
          skip_region_validation      = true
          skip_requesting_account_id  = true
          use_path_style              = true
          EOF
          terraform -chdir=infra init -input=false -reconfigure -backend-config=backend-ci.hcl

      - name: Terraform apply
        if: steps.meta.outputs.skip != 'true'
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          REGION="${{ vars.AWS_DEFAULT_REGION }}"
          REGION="${REGION:-eu-central}"
          export AWS_DEFAULT_REGION="$REGION"
          SERVER_TYPE="${{ inputs.server_type || 'cpx32' }}"
          terraform -chdir=infra apply -auto-approve \
            -var="server_name=inherent-ci-${{ github.run_id }}" \
            -var="ssh_key_name=inherent-ci-key-${{ github.run_id }}" \
            -var="ssh_public_key_path=${HETZNER_SSH_PUB}" \
            -var="inherent_version=${{ steps.meta.outputs.image_tag }}" \
            -var="compose_git_ref=${{ steps.meta.outputs.git_ref }}" \
            -var="server_type=${SERVER_TYPE}"

      - name: Export server IP
        if: steps.meta.outputs.skip != 'true'
        run: |
          echo "SERVER_IPV4=$(terraform -chdir=infra output -raw server_ipv4)" >> "$GITHUB_ENV"

      - name: Wait for the public API to be healthy
        if: steps.meta.outputs.skip != 'true'
        run: |
          for i in $(seq 1 60); do
            if curl -fsS "http://${SERVER_IPV4}:18000/health" >/dev/null 2>&1; then
              echo "public API healthy on ${SERVER_IPV4}"; exit 0
            fi
            echo "waiting for public API ($i)..."; sleep 15
          done
          echo "::error::public API on ${SERVER_IPV4}:18000 did not become healthy in time"; exit 1

      - name: Bootstrap dev workspace and API key on VM
        if: steps.meta.outputs.skip != 'true'
        run: |
          ssh -i "$HETZNER_SSH_KEY" \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=/dev/null \
            "root@${SERVER_IPV4}" 'bash -s' < scripts/dev/bootstrap.sh

      # Fail fast when public-api cannot auth to Weaviate (stale image / missing Bearer).
      - name: Preflight Weaviate auth via public-api search
        if: steps.meta.outputs.skip != 'true'
        run: |
          BASE="http://${SERVER_IPV4}:18000"
          RESP=$(curl -sS -w "\n%{http_code}" -X POST "${BASE}/v1/search" \
            -H "X-API-Key: ink_dev_local_key_001" \
            -H "X-Workspace-Id: ws_local_001" \
            -H "Content-Type: application/json" \
            -d '{"query":"ping","limit":1}' || true)
          BODY=$(echo "$RESP" | sed '$d')
          CODE=$(echo "$RESP" | tail -n1)
          echo "preflight HTTP ${CODE}"
          echo "$BODY" | head -c 2000
          if echo "$BODY" | grep -qiE 'weaviate.*(401|Unauthorized)|(401|Unauthorized).*weaviate' \
            || { [ "$CODE" = "500" ] && echo "$BODY" | grep -qiE 'weaviate' && echo "$BODY" | grep -qiE '401|Unauthorized'; }; then
            echo "::error::public-api cannot authenticate to Weaviate (401 Unauthorized on graphql). Stale public-api-svc image is likely missing Bearer auth to Weaviate. Republish via the Publish images workflow and see docs/audit/act-hetzner-e2e-weaviate-401.md"
            exit 1
          fi
          if [ "$CODE" = "200" ]; then
            echo "Weaviate auth preflight OK"
            exit 0
          fi
          echo "warning: preflight got HTTP ${CODE} without Weaviate 401 pattern; leaving diagnosis to pytest"
          exit 0

      - name: Run public-api compose tests
        if: steps.meta.outputs.skip != 'true'
        working-directory: services/inh-public-api-svc
        env:
          PUBLIC_API_URL: http://${{ env.SERVER_IPV4 }}:18000
          INTEGRATION_API_KEY: ink_dev_local_key_001
          INTEGRATION_WORKSPACE_ID: ws_local_001
          INTEGRATION_TIMEOUT: "600"
        run: |
          uv sync --frozen --extra dev --group dev
          uv run pytest -m compose

      - name: Dump Compose logs on failure
        if: failure() && steps.meta.outputs.skip != 'true'
        continue-on-error: true
        run: |
          ssh -i "$HETZNER_SSH_KEY" \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=/dev/null \
            "root@${SERVER_IPV4}" \
            'docker compose -f /opt/inherent/docker-compose.release.yml logs --no-color --tail=200'

      # Always destroy using remote CI state so CI never leaves a paid VM.
      - name: Terraform destroy
        if: always() && steps.meta.outputs.skip != 'true'
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "${HCLOUD_TOKEN}" ]; then
            echo "::error::secrets.HCLOUD_TOKEN is empty; cannot destroy"
            exit 1
          fi
          if [ -z "${AWS_ACCESS_KEY_ID}" ]; then
            echo "::error::secrets.AWS_ACCESS_KEY_ID is empty; cannot destroy"
            exit 1
          fi
          if [ -z "${AWS_SECRET_ACCESS_KEY}" ]; then
            echo "::error::secrets.AWS_SECRET_ACCESS_KEY is empty; cannot destroy"
            exit 1
          fi
          if [ -z "${{ vars.HETZNER_S3_BUCKET }}" ]; then
            echo "::error::vars.HETZNER_S3_BUCKET is empty; cannot destroy"
            exit 1
          fi
          if [ -z "${{ vars.HETZNER_S3_ENDPOINT }}" ]; then
            echo "::error::vars.HETZNER_S3_ENDPOINT is empty; cannot destroy"
            exit 1
          fi
          REGION="${{ vars.AWS_DEFAULT_REGION }}"
          REGION="${REGION:-eu-central}"
          export AWS_DEFAULT_REGION="$REGION"
          # Rewrite backend-ci.hcl + re-init so destroy works alone after cancel.
          cat > infra/backend-ci.hcl <<EOF
          bucket = "${{ vars.HETZNER_S3_BUCKET }}"
          key    = "inherent/ci/${{ github.run_id }}/terraform.tfstate"

          endpoints = {
            s3 = "${{ vars.HETZNER_S3_ENDPOINT }}"
          }

          skip_credentials_validation = true
          skip_metadata_api_check     = true
          skip_region_validation      = true
          skip_requesting_account_id  = true
          use_path_style              = true
          EOF
          terraform -chdir=infra init -input=false -reconfigure -backend-config=backend-ci.hcl
          SERVER_TYPE="${{ inputs.server_type || 'cpx32' }}"
          terraform -chdir=infra destroy -auto-approve \
            -var="server_name=inherent-ci-${{ github.run_id }}" \
            -var="ssh_key_name=inherent-ci-key-${{ github.run_id }}" \
            -var="ssh_public_key_path=${HETZNER_SSH_PUB}" \
            -var="inherent_version=${{ steps.meta.outputs.image_tag }}" \
            -var="compose_git_ref=${{ steps.meta.outputs.git_ref }}" \
            -var="server_type=${SERVER_TYPE}"
