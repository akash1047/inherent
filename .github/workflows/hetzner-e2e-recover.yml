# Use when primary e2e was killed after apply; if apply never wrote state,
# delete inherent-ci-* in Hetzner console/API instead.
name: Hetzner e2e recover destroy

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: GitHub Actions run id of the stuck e2e job
        type: string
        required: true
      inherent_version:
        description: Docker image tag for Inherent (must match apply vars)
        type: string
        default: latest
      server_type:
        description: Hetzner server type (must match apply vars)
        type: string
        default: cpx32

permissions:
  contents: read

jobs:
  recover-destroy:
    name: Destroy stuck Hetzner e2e by run_id
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Require HCLOUD_TOKEN and S3 backend secrets/vars
        run: |
          missing=0
          if [ -z "${{ secrets.HCLOUD_TOKEN }}" ]; then
            echo "::error::secrets.HCLOUD_TOKEN is empty; cannot destroy Hetzner VM"
            missing=1
          fi
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "::error::secrets.AWS_ACCESS_KEY_ID is empty; cannot use Hetzner Object Storage state"
            missing=1
          fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "::error::secrets.AWS_SECRET_ACCESS_KEY is empty; cannot use Hetzner Object Storage state"
            missing=1
          fi
          if [ -z "${{ vars.HETZNER_S3_BUCKET }}" ]; then
            echo "::error::vars.HETZNER_S3_BUCKET is empty; cannot use Hetzner Object Storage state"
            missing=1
          fi
          if [ -z "${{ vars.HETZNER_S3_ENDPOINT }}" ]; then
            echo "::error::vars.HETZNER_S3_ENDPOINT is empty; cannot use Hetzner Object Storage state"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      # Destroy needs ssh_public_key_path even if the Hetzner key resource is already gone.
      - name: Generate temp SSH key
        run: |
          KEY="$RUNNER_TEMP/hetzner_ci_recover"
          ssh-keygen -t ed25519 -N "" -f "$KEY" -C "inherent-ci-recover-${{ inputs.run_id }}"
          chmod 600 "$KEY"
          echo "HETZNER_SSH_PUB=${KEY}.pub" >> "$GITHUB_ENV"

      - name: Terraform init and destroy (remote CI state)
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          REGION="${{ vars.AWS_DEFAULT_REGION }}"
          REGION="${REGION:-eu-central}"
          export AWS_DEFAULT_REGION="$REGION"
          cat > infra/backend-ci.hcl <<EOF
          bucket = "${{ vars.HETZNER_S3_BUCKET }}"
          key    = "inherent/ci/${{ inputs.run_id }}/terraform.tfstate"

          endpoints = {
            s3 = "${{ vars.HETZNER_S3_ENDPOINT }}"
          }

          skip_credentials_validation = true
          skip_metadata_api_check     = true
          skip_region_validation      = true
          skip_requesting_account_id  = true
          use_path_style              = true
          EOF
          terraform -chdir=infra init -input=false -reconfigure -backend-config=backend-ci.hcl
          terraform -chdir=infra destroy -auto-approve \
            -var="server_name=inherent-ci-${{ inputs.run_id }}" \
            -var="ssh_key_name=inherent-ci-key-${{ inputs.run_id }}" \
            -var="ssh_public_key_path=${HETZNER_SSH_PUB}" \
            -var="inherent_version=${{ inputs.inherent_version }}" \
            -var="server_type=${{ inputs.server_type }}"
