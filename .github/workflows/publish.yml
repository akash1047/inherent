name: Publish images

# Build and push the two custom Inherent service images to GitHub Container
# Registry (ghcr.io/<owner>/<service>). The eight upstream OSS images in the
# Compose stack (postgres, mongo, weaviate, valkey, s3rver, TEI, temporal, ui)
# are NOT republished — they are pulled from their own public registries.
#
# Flow:
#   1. A release candidate is cut by pushing a version tag, e.g.
#        git tag v0.4.0-rc1 && git push origin v0.4.0-rc1   (candidate)
#        git tag v0.4.0     && git push origin v0.4.0        (final)
#   2. The `build` job validates BOTH images build (multi-arch, no push).
#   3. The `publish` job is gated on the `release-publish` Environment, which
#      must be configured in repo Settings → Environments with "Required
#      reviewers". GitHub pauses the job until a human approves — nothing is
#      pushed to GHCR without that approval.

on:
  push:
    tags:
      - "v*" # includes release candidates (v1.2.3-rc1) and finals (v1.2.3)
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Stage 1 — build both images (multi-arch) WITHOUT pushing, so reviewers are
  # only asked to approve a release that actually builds. The gha cache is
  # populated here and reused by the publish stage for a fast second build.
  build:
    name: build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ingestion-svc
            dockerfile: services/inh-ingestion-svc/Dockerfile
          - image: public-api-svc
            dockerfile: services/inh-public-api-svc/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          # Build context is the repo root so the sibling shared package
          # services/inh-contracts is visible (matches docker-compose.yml).
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Stage 2 — push to GHCR. Gated on the `release-publish` Environment: with
  # required reviewers configured, this job waits for human approval before it
  # runs, so the push cannot happen unattended.
  publish:
    name: publish ${{ matrix.image }}
    needs: build
    runs-on: ubuntu-latest
    environment: release-publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ingestion-svc
            dockerfile: services/inh-ingestion-svc/Dockerfile
          - image: public-api-svc
            dockerfile: services/inh-public-api-svc/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # owner must be lowercase for GHCR; ${{ github.repository_owner }} may
      # contain uppercase, so normalize it.
      - name: Compute lowercase image namespace
        id: ns
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.ns.outputs.owner }}/${{ matrix.image }}
          # :X.Y.Z always. :latest only for a FINAL release (a tag with no
          # pre-release suffix) — a -rc tag publishes :X.Y.Z-rcN but never
          # moves :latest.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-
          flavor: |
            latest=false

      - name: Promote :latest on final releases only
        id: latest
        run: |
          ref="${GITHUB_REF_NAME}"
          if [[ "$ref" == v* && "$ref" != *-* ]]; then
            echo "tags=ghcr.io/${{ steps.ns.outputs.owner }}/${{ matrix.image }}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.latest.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # `labels` only bakes into each per-arch image config. For a
          # multi-platform push, GHCR's package page reads the OCI
          # *annotations* on the manifest index instead — without this the
          # index carries no description/source/revision and the package page
          # shows "No description provided" even though metadata-action
          # generated the values (#112).
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
