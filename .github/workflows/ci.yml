name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  service-checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # cov_fail_under is the OVERALL per-service coverage floor enforced in
        # the Test step (each service's pyproject addopts already adds --cov).
        # Values are intentionally conservative so CI stays green today; they
        # should be ratcheted UP over time. Per-core-module floors are NOT
        # enforced in CI yet -- the modules to tighten first are:
        #   public-api:  auth / search / documents
        #   ingestion:   quality / extract / store / document_ingestion
        include:
          - service: inh-ingestion-svc
            path: services/inh-ingestion-svc
            python-version: "3.11"
            lint: uv run ruff check src tests
            format: uv run black --check src tests
            typecheck: ""
            security: ""
            test: uv run pytest
            cov_fail_under: 40
          - service: inh-public-api-svc
            path: services/inh-public-api-svc
            python-version: "3.11"
            lint: uv run ruff check src tests
            format: uv run black --check src tests
            typecheck: uv run mypy src
            security: uv run bandit -c pyproject.toml -r src
            test: uv run pytest
            cov_fail_under: 45

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: knowledge_base
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ${{ matrix.path }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen --extra dev --group dev

      - name: Lint
        run: ${{ matrix.lint }}

      - name: Format check
        run: ${{ matrix.format }}

      - name: Type check
        if: ${{ matrix.typecheck }}
        run: ${{ matrix.typecheck }}

      - name: Security check
        if: ${{ matrix.security }}
        run: ${{ matrix.security }}

      # Each service's pyproject [tool.pytest.ini_options] addopts already adds
      # --cov; here we enforce the overall coverage floor. Raise cov_fail_under
      # over time as the core modules listed in the matrix comment gain tests.
      - name: Test
        run: ${{ matrix.test }} --cov-fail-under=${{ matrix.cov_fail_under }}

  required-tests:
    name: Required tests before merge
    runs-on: ubuntu-latest
    needs:
      - service-checks
    if: always()
    steps:
      - name: Verify service checks passed
        run: |
          if [ "${{ needs.service-checks.result }}" != "success" ]; then
            echo "::error::One or more service checks failed. Do not merge until CI is green."
            exit 1
          fi

          echo "All service checks passed."
